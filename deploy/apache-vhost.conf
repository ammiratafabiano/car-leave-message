<VirtualHost *:80>
    ServerName car.ammiratafabiano.dev
    RewriteEngine on
    RewriteCond %{SERVER_NAME} =car.ammiratafabiano.dev
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName car.ammiratafabiano.dev
        ProxyPreserveHost On
        ProxyPass / http://127.0.0.1:8083/
        ProxyPassReverse / http://127.0.0.1:8083/
        RequestHeader set X-Forwarded-Proto "https"
        SSLCertificateFile /etc/letsencrypt/live/car.ammiratafabiano.dev/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/car.ammiratafabiano.dev/privkey.pem
        Include /etc/letsencrypt/options-ssl-apache.conf
    </VirtualHost>
</IfModule>
